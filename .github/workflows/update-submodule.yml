name: Sync board-docs Submodule

on:
  schedule:
    # Daily 12:00 Beijing (04:00 UTC)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Init and update board-docs submodule
        id: changes
        run: |
          set -e
          git submodule update --init board-docs
          cd board-docs
          git fetch origin main
          BEFORE=$(git rev-parse HEAD)
          git checkout origin/main
          AFTER=$(git rev-parse HEAD)
          cd ..
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "board-docs already at $AFTER"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "board-docs updated: $BEFORE → $AFTER"
            echo "--- Changed files ---"
            git -C board-docs diff --stat $BEFORE..$AFTER
            echo "--- Affected boards ---"
            git -C board-docs diff --name-only $BEFORE..$AFTER | sed 's|^board-docs/||' | cut -d'/' -f1 | sort -u
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Verify build
        if: steps.changes.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add board-docs
          if git diff --staged --quiet board-docs; then
            echo "No staged submodule changes, skipping push"
            exit 0
          fi
          git commit -m "chore: bump board-docs submodule"
          git push

      - name: Notify Cloudflare Pages to deploy
        if: steps.changes.outputs.changed == 'true'
        run: curl -sS -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/3af6ba0c-db9b-4807-bd7a-863dbdaf5205"
