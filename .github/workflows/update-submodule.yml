name: Sync board-docs Submodule

on:
  schedule:
    # Daily 12:00 Beijing (04:00 UTC)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Update board-docs submodule
        id: changes
        run: |
          git submodule update --remote board-docs
          if git diff --quiet board-docs; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "board-docs already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "board-docs submodule has updates"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Verify build
        if: steps.changes.outputs.changed == 'true'
        run: |
          git submodule update --init --recursive
          pnpm install --frozen-lockfile
          pnpm build

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add board-docs
          git commit -m "chore: bump board-docs submodule"
          git push
